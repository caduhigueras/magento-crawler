services:
  grafana:
    image: grafana/grafana-oss
    container_name: grafana
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_PLUGINS_PREINSTALL=grafana-clock-panel
      - GF_INSTALL_PLUGINS=vertamedia-clickhouse-datasource
    depends_on:
      - ch-server
    networks:
      - internal
  ch-server:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123" # http api
      - "9900:9000" # native
    environment:
      # default settings
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_USER: "" # Add here your clickhouse user
      CLICKHOUSE_PASSWORD: "" # Add here your clickhouse password
    volumes:
      - ./docker/clickhouse/init/001-init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
      - .volumes/ch_data:/var/lib/clickhouse
      - .volumes/ch_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: on-failure
    networks:
      - internal
volumes:
  grafana-storage: { }
networks:
  internal:
